services:
  - type: web
    name: cabank-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/cabank-backend-1.0.0.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false